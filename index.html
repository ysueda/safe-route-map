<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>豊島区 避難所ナビ（避難所データ拡充版）</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; } 
        
        #ui-panel {
            position: absolute; top: 10px; left: 10px; 
            z-index: 1000; 
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            width: 280px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #2c3e50; }
        .mode-selector { margin-bottom: 15px; }
        
        .btn {
            display: block; width: 100%; padding: 12px; margin-bottom: 8px;
            border: 2px solid #ddd; border-radius: 8px; background: #f8f9fa;
            font-size: 16px; cursor: pointer; transition: all 0.3s;
        }
        .btn.active { border-color: #e67e22; background: #fff3e0; font-weight: bold; }
        
        .btn-gps {
            background-color: #27ae60; color: white; border-color: #2ecc71; font-weight: bold;
        }
        .btn-gps:hover { background-color: #219653; }

        #status-area { font-size: 14px; color: #666; line-height: 1.4; margin-top: 10px; }
        .result-box { margin-top: 15px; padding: 10px; background: #eef2f3; border-radius: 5px; display: none; }
    </style>
</head>
<body>

<div id="ui-panel">
    <h2>豊島区 避難ナビ</h2>
    
    <button id="btn-gps" class="btn btn-gps" onclick="useGPS()">📍 現在地からナビ開始</button>
    <hr style="border: 0; border-top: 1px solid #ddd; margin: 15px 0;">

    <div class="mode-selector">
        <button id="btn-normal" class="btn active" onclick="setMode('normal')">🚶 通常徒歩</button>
        <button id="btn-elderly" class="btn" onclick="setMode('elderly')">👴 高齢者（階段・急坂回避）</button>
    </div>
    
    <div id="status-area">現在地を取得するか、地図をクリックしてください。</div>
    
    <div id="result-box" class="result-box">
        <b>最短の避難所:</b><br><span id="dest-name">-</span><br>
        <b>道なり距離:</b> <span id="dest-dist">-</span>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<script>
const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6Ijk1YjcxYzhlNWIxMzRlOGI5MWM2ZWM1ODI5ZjZhMzVmIiwiaCI6Im11cm11cjY0In0='; 

// ★変更点：新しい避難所が画面に収まりやすいよう、ズームレベルを17から15に少し引き気味に設定しました
const map = L.map('map', { zoomControl: false }).setView([35.736, 139.705], 15);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, 
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// ★変更点：指定された7つの避難所データに丸ごと入れ替え
const shelters = [
    {name: "みらい館大明", lng: 139.70474481582644, lat: 35.73539184518079},
    {name: "池袋中学校池袋本町小学校", lng: 139.71488356590274, lat: 35.74096095494103},
    {name: "旧文成中学校", lng: 139.71449196338656, lat: 35.74418293594858},
    {name: "要小学校", lng: 139.69388723373416, lat: 35.734198724875995},
    {name: "池袋第三小学校", lng: 139.70291018486026, lat: 35.728498498335576},
    {name: "池袋小学校", lng: 139.70957279205325, lat: 35.7377344892439},
    {name: "千川中学校", lng: 139.70010459423068, lat: 35.735775033310915}
];

// 地図上に避難所のピン（マーカー）を立てる
shelters.forEach(s => L.marker([s.lat, s.lng]).addTo(map).bindPopup(s.name));

// --- 独自ハザードエリアの設定 ---
const leafletHazardAreas = [
    [ 
        [35.73315799585287, 139.7002574801445], 
        [35.733125336772225, 139.70040768384936], 
        [35.73306219584498, 139.70040768384936], 
        [35.73309050040476, 139.7002708911896]  
    ],
    [ 
        [35.73376762956671, 139.7005605697632], 
        [35.73375021152534, 139.70072418451312], 
        [35.73369360286466, 139.7007215023041], 
        [35.73369795737846, 139.70055520534518]  
    ]
];

const hazardPolygons = leafletHazardAreas.map(area => 
    L.polygon(area, {color: 'red', fillColor: '#f03', fillOpacity: 0.5}).bindPopup("高齢者通行困難エリア（階段・急坂）")
);
const hazardPolygonLayer = L.layerGroup(hazardPolygons);

const apiHazardPolygons = [
    [[ 
        [139.7002574801445, 35.73315799585287],  
        [139.7002708911896, 35.73309050040476],   
        [139.70040768384936, 35.73306219584498],  
        [139.70040768384936, 35.733125336772225], 
        [139.7002574801445, 35.73315799585287]    
    ]],
    [[ 
        [139.7005605697632, 35.73376762956671],  
        [139.70055520534518, 35.73369795737846],   
        [139.7007215023041, 35.73369360286466],  
        [139.70072418451312, 35.73375021152534], 
        [139.7005605697632, 35.73376762956671]    
    ]]
];

let routeLayer = null; 
let userMarker = null; 
let currentMode = 'normal'; 

function setMode(mode) {
    currentMode = mode; 
    document.getElementById('btn-normal').classList.toggle('active', mode === 'normal');
    document.getElementById('btn-elderly').classList.toggle('active', mode === 'elderly');
    
    document.getElementById('status-area').innerText = mode === 'elderly' 
        ? "高齢者モード：指定した危険エリアや階段を避けたルートを探します。" 
        : "通常モードで検索します。";

    if (mode === 'elderly') {
        if (!map.hasLayer(hazardPolygonLayer)) hazardPolygonLayer.addTo(map);
    } else {
        if (map.hasLayer(hazardPolygonLayer)) map.removeLayer(hazardPolygonLayer);
    }
}

async function calculateRoute(userLat, userLng) {
    if (currentMode === 'elderly') {
        const point = turf.point([userLng, userLat]); 
        let inHazard = false;
        
        apiHazardPolygons.forEach(polyCoords => {
            const polygon = turf.polygon(polyCoords);
            if (turf.booleanPointInPolygon(point, polygon)) {
                inHazard = true;
            }
        });
        
        if (inHazard) {
            alert("危険エリアの中にいます！安全な場所に移動してから再度取得してください。");
            document.getElementById('status-area').innerText = "エラー：危険エリア内にいます。";
            return; 
        }
    }

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([userLat, userLng], {color: '#27ae60', radius: 10, fillOpacity: 1.0}).addTo(map);
    
    document.getElementById('status-area').innerText = "ルートを計算中...";

    let nearest = shelters[0]; 
    let minDist = Infinity; 
    
    shelters.forEach(s => {
        let d = turf.distance([userLng, userLat], [s.lng, s.lat]);
        if (d < minDist) { 
            minDist = d; 
            nearest = s; 
        }
    });

    const url = 'https://api.openrouteservice.org/v2/directions/foot-walking/geojson';
    const requestBody = { coordinates: [[userLng, userLat], [nearest.lng, nearest.lat]] };

    if (currentMode === 'elderly') {
        requestBody.options = {
            avoid_features: ["steps"], 
            avoid_polygons: { type: "MultiPolygon", coordinates: apiHazardPolygons }
        };
    }

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': ORS_API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody) 
        });
        
        const data = await response.json();

        if (data.error) {
            console.error(data.error);
            alert("経路が計算できませんでした。");
            document.getElementById('status-area').innerText = "ルートが見つかりません。";
            return;
        }

        if (data.features && data.features.length > 0) {
            if (routeLayer) map.removeLayer(routeLayer); 

            const routeStyle = {
                color: currentMode === 'elderly' ? '#e67e22' : '#3498db', 
                weight: currentMode === 'elderly' ? 10 : 6, 
                opacity: 0.8
            };

            routeLayer = L.geoJSON(data.features[0], { style: routeStyle }).addTo(map);
            const dist = (data.features[0].properties.summary.distance / 1000).toFixed(2);
            
            document.getElementById('status-area').innerText = "現在地からのルートが見つかりました！";
            document.getElementById('result-box').style.display = 'block'; 
            document.getElementById('dest-name').innerText = nearest.name; 
            document.getElementById('dest-dist').innerText = dist + " km"; 
            
            map.fitBounds(routeLayer.getBounds(), {padding: [50, 50]});
        }
    } catch (error) {
        console.error(error);
        alert("通信エラーが発生しました。");
        document.getElementById('status-area').innerText = "エラーが発生しました。";
    }
}

function useGPS() {
    document.getElementById('status-area').innerText = "📍 人工衛星から現在地を取得中...";
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                map.setView([lat, lng], 17);
                calculateRoute(lat, lng);
            },
            function(error) {
                alert("現在地が取得できませんでした。スマホの設定で位置情報を許可してください。");
                document.getElementById('status-area').innerText = "エラー：現在地の取得に失敗しました。";
            },
            { enableHighAccuracy: true } 
        );
    } else {
        alert("お使いのブラウザはGPS機能に対応していません。");
    }
}

map.on('click', function(e) {
    calculateRoute(e.latlng.lat, e.latlng.lng);
});

</script>
</body>
</html>

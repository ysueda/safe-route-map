<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>豊島区 避難所ナビ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background: #f4f4f4; }
        #map { height: 100vh; width: 100%; z-index: 1; }

        #top-panel {
            position: absolute; top: 10px; left: 10px;
            z-index: 1000; width: auto; min-width: 190px; max-width: 250px;
            background: rgba(255,255,255,0.95); padding: 10px 12px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        #status-area { font-size: 12px; color: #333; font-weight: bold; }
        .result-box { margin-top: 6px; padding-top: 6px; border-top: 1px solid #ddd; display: none; font-size: 13px; line-height: 1.6; }

        #rest-info {
            display: none; margin-top: 6px;
            padding: 6px 8px; background: #e8f8f5; border-radius: 6px; font-size: 12px;
        }
        #rest-info.warning { background: #fef9e7; color: #d35400; }

        /* 凡例 */
        #legend {
            position: absolute; bottom: 180px; left: 10px;
            z-index: 1000; background: rgba(255,255,255,0.92);
            padding: 8px 10px; border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            font-size: 11px; line-height: 1.8;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot {
            width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
        }

        #bottom-panel {
            position: absolute; bottom: 0; left: 0; width: 100%;
            z-index: 1000; background: white;
            padding: 20px 15px 30px 15px; box-sizing: border-box;
            border-radius: 20px 20px 0 0; box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
        }
        .btn-main {
            display: block; width: 100%; padding: 18px;
            background: #e74c3c; color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; box-shadow: 0 4px 6px rgba(231,76,60,0.4);
            cursor: pointer;
        }
        .btn-main:active { background: #c0392b; transform: translateY(2px); box-shadow: none; }
        .btn-toggle-others {
            display: block; width: 100%; margin-top: 15px; padding: 10px;
            background: transparent; color: #7f8c8d; border: none;
            font-size: 14px; text-decoration: underline; cursor: pointer;
        }
        #others-menu { display: none; margin-top: 15px; border-top: 1px solid #eee; padding-top: 15px; }
        .btn-sub {
            display: block; width: 100%; padding: 12px; margin-bottom: 8px;
            background: #f8f9fa; color: #2c3e50; border: 2px solid #ddd; border-radius: 8px;
            font-size: 15px; font-weight: bold; cursor: pointer;
        }
        .btn-sub:active { background: #e2e6ea; }

        #loading-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.35); z-index: 2000;
            justify-content: center; align-items: center;
        }
        #loading-overlay.active { display: flex; }
        #loading-box {
            background: white; border-radius: 12px; padding: 24px 32px;
            text-align: center; font-size: 15px; font-weight: bold; color: #333;
        }
        .spinner {
            width: 36px; height: 36px; border: 4px solid #eee;
            border-top-color: #e74c3c; border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="map"></div>

<div id="loading-overlay">
    <div id="loading-box">
        <div class="spinner"></div>
        ルートを計算中…
    </div>
</div>

<div id="top-panel">
    <div id="status-area">下のボタンを押すとナビが始まります</div>
    <div id="result-box" class="result-box">
        <b>最寄り避難所:</b><br>
        <span id="dest-name" style="font-size:15px; color:#2980b9; font-weight:bold;">-</span><br>
        <b>距離:</b> <span id="dest-dist" style="font-weight:bold;">-</span>
        <div id="rest-info">
            <span id="rest-text"></span>
        </div>
    </div>
</div>

<!-- 凡例 -->
<div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#e74c3c;"></div>現在地</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2c3e50; border-radius:2px;"></div>避難所</div>
    <div class="legend-item"><div class="legend-dot" style="background:#27ae60;"></div>休憩スポット</div>
    <div class="legend-item"><div class="legend-dot" style="background:#2980b9;"></div>公衆トイレ</div>
    <div class="legend-item"><div class="legend-dot" style="background:red; opacity:0.6;"></div>危険エリア</div>
</div>

<div id="bottom-panel">
    <button class="btn-main" onclick="quickEvacuate()">🆘 現在地から安全ルートを探す</button>
    <button class="btn-toggle-others" onclick="toggleOthers()">その他のルートを開く ▼</button>
    <div id="others-menu">
        <button class="btn-sub" onclick="startMode('normal')">🚶 最短で行く（通常徒歩）</button>
    </div>
</div>

// ── UI操作 ──────────────────────────────────────────────
function toggleOthers() {
    const menu = document.getElementById('others-menu');
    const btn  = document.querySelector('.btn-toggle-others');
    const open = menu.style.display === 'block';
    menu.style.display = open ? 'none' : 'block';
    btn.innerText = open ? "その他のルートを開く ▼" : "閉じる ▲";
}

function quickEvacuate() { startMode('elderly'); }

function startMode(mode) {
    currentMode = mode;
    if (mode === 'elderly') {
        if (!map.hasLayer(hazardLayer)) hazardLayer.addTo(map);
    } else {
        if (map.hasLayer(hazardLayer)) map.removeLayer(hazardLayer);
    }
    document.getElementById('others-menu').style.display = 'none';
    document.querySelector('.btn-toggle-others').innerText = "その他のルートを開く ▼";
    useGPS();
}

function setLoading(v) {
    document.getElementById('loading-overlay').classList.toggle('active', v);
}

// ── GPS取得 ──────────────────────────────────────────────
function useGPS() {
    document.getElementById('status-area').innerText = "📍 現在地を取得中...";
    if (!navigator.geolocation) {
        alert("GPSが使えません。地図をタップして場所を指定してください。");
        document.getElementById('status-area').innerText = "地図をタップしてください";
        return;
    }
    navigator.geolocation.getCurrentPosition(
        pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
            calculateRoute(pos.coords.latitude, pos.coords.longitude);
        },
        () => {
            alert("位置情報が取得できません。地図をタップして場所を指定してください。");
            document.getElementById('status-area').innerText = "地図をタップしてください";
        },
        { enableHighAccuracy: true }
    );
}

map.on('click', e => calculateRoute(e.latlng.lat, e.latlng.lng));

// ── ルート計算メイン ─────────────────────────────────────
async function calculateRoute(userLat, userLng) {
    setLoading(true);

    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([userLat, userLng], {
        color:'#e74c3c', radius:8, fillOpacity:1.0
    }).addTo(map);

    const userPt = [userLng, userLat];

    // Step1: 直線距離で最寄り避難所を選ぶ
    let nearestShelter = shelters[0];
    let minDistKm = Infinity;
    shelters.forEach(s => {
        const d = turf.distance(userPt, [s.lng, s.lat]);
        if (d < minDistKm) { minDistKm = d; nearestShelter = s; }
    });
    const minDistM = minDistKm * 1000;
    const shelterPt = [nearestShelter.lng, nearestShelter.lat];

    // Step2: 高齢者モード・500m以上なら休憩スポット経由を検討
    let routeCoords  = [userPt, shelterPt];
    let selectedRest = null;
    let detourReason = "";

    if (currentMode === 'elderly' && minDistM >= REST_TRIGGER_M) {
        let bestTotalM = Infinity;

        restSpots.forEach(spot => {
            const spotPt     = [spot.lng, spot.lat];
            const d2spotM    = turf.distance(userPt, spotPt) * 1000;
            const d2shelterM = turf.distance(spotPt, shelterPt) * 1000;

            if (d2spotM < MIN_ENDPOINT_DIST_M || d2shelterM < MIN_ENDPOINT_DIST_M) return;

            const totalM  = d2spotM + d2shelterM;
            const detourM = totalM - minDistM;

            if (detourM <= MAX_DETOUR_M && totalM < bestTotalM) {
                bestTotalM   = totalM;
                selectedRest = spot;
            }
        });

        if (selectedRest) {
            routeCoords = [userPt, [selectedRest.lng, selectedRest.lat], shelterPt];
        } else {
            detourReason = "近くに適切な休憩スポットがないため直接向かいます";
        }
    }

    // Step3: ORS API で最終ルートを1回取得
    const body = { coordinates: routeCoords };
    if (currentMode === 'elderly') {
        body.options = {
            avoid_features: ["steps"],
            avoid_polygons: { type: "MultiPolygon", coordinates: hazardPolygons }
        };
    }

    try {
        const res  = await fetch('https://api.openrouteservice.org/v2/directions/foot-walking/geojson', {
            method: 'POST',
            headers: { 'Authorization': ORS_API_KEY, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();

        if (data.features && data.features.length > 0) {
            if (routeLayer) map.removeLayer(routeLayer);

            const color = currentMode === 'elderly' ? '#e74c3c' : '#3498db';
            routeLayer = L.geoJSON(data.features[0], {
                style: { color, weight: 8, opacity: 0.8 }
            }).addTo(map);

            const distKm = (data.features[0].properties.summary.distance / 1000).toFixed(2);

            document.getElementById('status-area').innerText = "ルートが見つかりました！";
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('dest-name').innerText = nearestShelter.name;
            document.getElementById('dest-dist').innerText  = distKm + " km";

            const restInfoEl = document.getElementById('rest-info');
            const restTextEl = document.getElementById('rest-text');

            if (currentMode === 'elderly' && minDistM >= REST_TRIGGER_M) {
                restInfoEl.style.display = 'block';
                if (selectedRest) {
                    restInfoEl.className = '';
                    restTextEl.innerHTML = `🌳 <b>経由休憩スポット:</b><br>${selectedRest.name}`;
                } else {
                    restInfoEl.className = 'warning';
                    restTextEl.innerHTML = `⚠️ ${detourReason}`;
                }
            } else {
                restInfoEl.style.display = 'none';
            }

            map.fitBounds(routeLayer.getBounds(), {
                paddingBottomRight: [0, 200], paddingTopLeft: [200, 0]
            });
        } else {
            document.getElementById('status-area').innerText = "ルートが見つかりませんでした。";
        }
    } catch (err) {
        document.getElementById('status-area').innerText = "ルートの取得に失敗しました。";
        console.error(err);
    } finally {
        setLoading(false);
    }
}
</script>
